<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — La Jolla Freedive Club</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0B1D2C;
      color: #FAF3EC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    .icon { font-size: 48px; margin-bottom: 1.5rem; opacity: 0.6; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 0.9rem;
      color: rgba(250, 243, 236, 0.6);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: #1B6B6B;
      color: #FAF3EC;
      border: none;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .hint {
      font-size: 0.75rem;
      color: rgba(250, 243, 236, 0.3);
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌊</div>
    <h1>You're offline</h1>
    <p>Can't reach the ocean data right now. Check your connection and try again — the conditions will be here when you're back.</p>
    <button onclick="window.location.reload()">Try again</button>
    <p class="hint">La Jolla Freedive Club</p>
  </div>
</body>
</html>
